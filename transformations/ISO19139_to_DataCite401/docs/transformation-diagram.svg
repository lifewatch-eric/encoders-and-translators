<svg viewBox="0 0 820 1000" xmlns="http://www.w3.org/2000/svg"
     style="background:#0d1117;font-family:monospace">
  <defs>
    <style>
      text { font-family: 'DM Mono', 'Courier New', monospace; }
    </style>
    <marker id="arr"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/></marker>
    <marker id="arrg" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/></marker>
  </defs>

  <!-- title -->
  <text x="410" y="28" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold">ISO 19139 → DataCite 4.0.1 (OpenAIRE) — Transformation Flow</text>
  <text x="410" y="44" text-anchor="middle" font-size="9" fill="#8b949e">xslt/main.xsl · XSLT 1.0 · LifeWatch ERIC · Harvesting with OpenAIRE</text>

  <!-- INPUT -->
  <rect x="260" y="58" width="300" height="48" rx="8" fill="#0d2211" stroke="#3fb950" stroke-width="1.5"/>
  <text x="410" y="78" text-anchor="middle" font-size="9" fill="#3fb950">INPUT</text>
  <text x="410" y="96" text-anchor="middle" font-size="11" fill="#e6edf3" font-weight="bold">gmd:MD_Metadata (ISO 19139, Workflow or VRE)</text>
  <line x1="410" y1="106" x2="410" y2="136" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- match root -->
  <rect x="180" y="136" width="460" height="40" rx="7" fill="#1f2937" stroke="#21262d" stroke-width="1.5"/>
  <text x="410" y="152" text-anchor="middle" font-size="8" fill="#8b949e">xsl:template match="/*"  ·  $resource-type = Workflow | VRE</text>
  <text x="410" y="168" text-anchor="middle" font-size="10" fill="#e6edf3">Build oaire:resource — same vocabulary as EML220_to_DataCite401</text>
  <line x1="410" y1="176" x2="410" y2="204" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- body box -->
  <rect x="130" y="204" width="560" height="644" rx="8" fill="#0d1a0d" stroke="#1a4a1f" stroke-width="1.5"/>
  <text x="410" y="222" text-anchor="middle" font-size="8" fill="#3fb950">oaire:resource children — emitted in this order</text>

  <!-- Row 1 -->
  <rect x="150" y="234" width="255" height="52" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="277" y="250" text-anchor="middle" font-size="9" fill="#3fb950">① datacite:identifier</text>
  <text x="277" y="263" text-anchor="middle" font-size="7" fill="#8b949e">DOI from onLine resource, else</text>
  <text x="277" y="275" text-anchor="middle" font-size="7" fill="#8b949e">URL fallback (added, see notes)</text>

  <rect x="415" y="234" width="255" height="52" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="542" y="250" text-anchor="middle" font-size="9" fill="#3fb950">② alternateIdentifiers</text>
  <text x="542" y="263" text-anchor="middle" font-size="7" fill="#8b949e">fileIdentifier → PackageID</text>
  <text x="542" y="275" text-anchor="middle" font-size="7" fill="#8b949e">alternateIdentifierType</text>

  <!-- Row 2 -->
  <rect x="150" y="296" width="255" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="277" y="312" text-anchor="middle" font-size="9" fill="#3fb950">③ titles/title</text>
  <text x="277" y="326" text-anchor="middle" font-size="7" fill="#8b949e">citation/title (no xml:lang)</text>

  <rect x="415" y="296" width="255" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="542" y="312" text-anchor="middle" font-size="9" fill="#3fb950">④ publisher</text>
  <text x="542" y="326" text-anchor="middle" font-size="7" fill="#8b949e">fixed "LifeWatch ERIC"</text>

  <!-- Row 3 -->
  <rect x="150" y="346" width="255" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="277" y="362" text-anchor="middle" font-size="9" fill="#3fb950">⑤ publicationYear</text>
  <text x="277" y="376" text-anchor="middle" font-size="7" fill="#8b949e">added — see mapping-notes</text>

  <rect x="415" y="346" width="255" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="542" y="362" text-anchor="middle" font-size="9" fill="#3fb950">⑥ dates[Issued]</text>
  <text x="542" y="376" text-anchor="middle" font-size="7" fill="#8b949e">date[type=publication]</text>

  <!-- Row 4 -->
  <rect x="150" y="396" width="520" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="410" y="412" text-anchor="middle" font-size="9" fill="#3fb950">⑦ descriptions[Abstract]</text>
  <text x="410" y="426" text-anchor="middle" font-size="7" fill="#8b949e">MD_DataIdentification/abstract</text>

  <!-- Row 5 -->
  <rect x="150" y="446" width="520" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="410" y="462" text-anchor="middle" font-size="9" fill="#3fb950">⑧ subjects</text>
  <text x="410" y="476" text-anchor="middle" font-size="7" fill="#8b949e">descriptiveKeywords/MD_Keywords/keyword — plain, no subjectScheme</text>

  <!-- Row 6 -->
  <rect x="150" y="496" width="255" height="52" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="277" y="512" text-anchor="middle" font-size="9" fill="#3fb950">⑨ creators</text>
  <text x="277" y="525" text-anchor="middle" font-size="7" fill="#8b949e">CI_ResponsibleParty where</text>
  <text x="277" y="537" text-anchor="middle" font-size="7" fill="#8b949e">party-target = "creator"</text>

  <rect x="415" y="496" width="255" height="52" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="542" y="512" text-anchor="middle" font-size="9" fill="#3fb950">⑩ contributors</text>
  <text x="542" y="525" text-anchor="middle" font-size="7" fill="#8b949e">everyone else, contributorType</text>
  <text x="542" y="537" text-anchor="middle" font-size="7" fill="#8b949e">from the 11-role routing table</text>

  <!-- Row 7 -->
  <rect x="150" y="558" width="520" height="52" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="410" y="574" text-anchor="middle" font-size="9" fill="#3fb950">⑪ resourceType + oaire:resourceType</text>
  <text x="410" y="587" text-anchor="middle" font-size="7" fill="#8b949e">Workflow → "Workflow" / c_393c · VRE → "InteractiveResource" / c_e9a0</text>

  <!-- Row 8 -->
  <rect x="150" y="620" width="520" height="52" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="410" y="636" text-anchor="middle" font-size="9" fill="#3fb950">⑫ rightsList</text>
  <text x="410" y="649" text-anchor="middle" font-size="7" fill="#8b949e">useLimitation → rightsIdentifier (SPDX); text is always the literal</text>
  <text x="410" y="661" text-anchor="middle" font-size="7" fill="#8b949e">"open access", per the sheet's worked example (see Known Limitations)</text>

  <!-- role routing table panel -->
  <rect x="150" y="682" width="520" height="150" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1.5"/>
  <text x="410" y="700" text-anchor="middle" font-size="8" fill="#8b949e">party-target — role routing table (verbatim from the source sheet)</text>
  <rect x="165" y="710" width="235" height="108" rx="5" fill="#0d1117" stroke="#21262d"/>
  <text x="282" y="726" text-anchor="middle" font-size="8" fill="#58a6ff">→ creator</text>
  <text x="282" y="740" text-anchor="middle" font-size="7" fill="#8b949e">author · creator · owner</text>
  <text x="282" y="754" text-anchor="middle" font-size="8" fill="#58a6ff" font-weight="bold">unrecognised role → "Other"</text>
  <text x="282" y="768" text-anchor="middle" font-size="7" fill="#8b949e">e.g. "originator" (VRE sample) —</text>
  <text x="282" y="780" text-anchor="middle" font-size="7" fill="#8b949e">not in the sheet's own table,</text>
  <text x="282" y="792" text-anchor="middle" font-size="7" fill="#8b949e">documented fallback</text>
  <rect x="420" y="710" width="235" height="108" rx="5" fill="#0d1117" stroke="#21262d"/>
  <text x="537" y="726" text-anchor="middle" font-size="8" fill="#58a6ff">→ contributor[type]</text>
  <text x="537" y="740" text-anchor="middle" font-size="7" fill="#8b949e">associated party → RelatedPerson</text>
  <text x="537" y="752" text-anchor="middle" font-size="7" fill="#8b949e">custodian → DataManager</text>
  <text x="537" y="764" text-anchor="middle" font-size="7" fill="#8b949e">distributor → Distributor</text>
  <text x="537" y="776" text-anchor="middle" font-size="7" fill="#8b949e">point of contact → ContactPerson</text>
  <text x="537" y="788" text-anchor="middle" font-size="7" fill="#8b949e">principal investigator → Supervisor</text>
  <text x="537" y="800" text-anchor="middle" font-size="7" fill="#8b949e">processor → DataCurator · resource</text>
  <text x="537" y="812" text-anchor="middle" font-size="7" fill="#8b949e">provider → Producer · user → Researcher</text>

  <!-- OUTPUT -->
  <line x1="410" y1="848" x2="410" y2="878" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrg)"/>
  <rect x="240" y="878" width="340" height="48" rx="8" fill="#0d2211" stroke="#3fb950" stroke-width="1.5"/>
  <text x="410" y="898" text-anchor="middle" font-size="9" fill="#3fb950">OUTPUT</text>
  <text x="410" y="916" text-anchor="middle" font-size="11" fill="#e6edf3" font-weight="bold">oaire:resource (OpenAIRE / DataCite 4.0.1 XML)</text>

  <!-- legend -->
  <text x="28" y="958" font-size="7" fill="#4a5568">Operations ①–⑫ correspond to the numbered/named sections in docs/mapping-notes.md</text>
  <text x="28" y="970" font-size="7" fill="#4a5568">creation date, revision date and status are marked "Not mapped" in the source sheet — intentionally omitted.</text>

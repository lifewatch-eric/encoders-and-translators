<?xml version="1.0" encoding="UTF-8"?>
<!--
  ISO19139_to_EOSC — Transformation Flow Diagram
  ==================================================
  Open in any browser or SVG viewer.
  Describes the complete execution path of xslt/main.xsl.
-->
<svg viewBox="0 0 820 1180" xmlns="http://www.w3.org/2000/svg"
     style="background:#0d1117;font-family:monospace">
  <defs>
    <style>
      text { font-family: 'DM Mono', 'Courier New', monospace; }
    </style>
    <marker id="arr"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/></marker>
    <marker id="arrg" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/></marker>
  </defs>

  <!-- title -->
  <text x="410" y="28" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold">ISO 19139 → EOSC Service — Transformation Flow</text>
  <text x="410" y="44" text-anchor="middle" font-size="9" fill="#8b949e">xslt/main.xsl · XSLT 1.0 · text/JSON output · LifeWatch ERIC</text>

  <!-- INPUT -->
  <rect x="280" y="58" width="260" height="48" rx="8" fill="#0d2211" stroke="#3fb950" stroke-width="1.5"/>
  <text x="410" y="78" text-anchor="middle" font-size="9" fill="#3fb950">INPUT</text>
  <text x="410" y="96" text-anchor="middle" font-size="11" fill="#e6edf3" font-weight="bold">gmd:MD_Metadata (ISO 19139, hierarchyLevel=service)</text>
  <line x1="410" y1="106" x2="410" y2="136" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- match root -->
  <rect x="200" y="136" width="420" height="40" rx="7" fill="#1f2937" stroke="#21262d" stroke-width="1.5"/>
  <text x="410" y="152" text-anchor="middle" font-size="8" fill="#8b949e">xsl:template match="/*"  ·  method="text"</text>
  <text x="410" y="168" text-anchor="middle" font-size="10" fill="#e6edf3">Build the EOSC "Service" JSON object, field by field</text>
  <line x1="410" y1="176" x2="410" y2="204" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- service JSON body box -->
  <rect x="130" y="204" width="560" height="818" rx="8" fill="#0d1a0d" stroke="#1a4a1f" stroke-width="1.5"/>
  <text x="410" y="222" text-anchor="middle" font-size="8" fill="#3fb950">Service JSON — emitted in this key order ("id" is never emitted)</text>

  <!-- Row 1 -->
  <rect x="150" y="234" width="255" height="52" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="277" y="250" text-anchor="middle" font-size="9" fill="#3fb950">① alternativePIDs</text>
  <text x="277" y="263" text-anchor="middle" font-size="7" fill="#8b949e">onLine resources where</text>
  <text x="277" y="275" text-anchor="middle" font-size="7" fill="#8b949e">protocol/CharacterString = "DOI"</text>

  <rect x="415" y="234" width="255" height="52" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="542" y="250" text-anchor="middle" font-size="9" fill="#3fb950">② url</text>
  <text x="542" y="263" text-anchor="middle" font-size="7" fill="#8b949e">[0] landing page (base-url + fileId)</text>
  <text x="542" y="275" text-anchor="middle" font-size="7" fill="#8b949e">[1..] distinct onLine/linkage/URL</text>

  <!-- Row 2 -->
  <rect x="150" y="296" width="255" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="277" y="312" text-anchor="middle" font-size="9" fill="#3fb950">③ name</text>
  <text x="277" y="326" text-anchor="middle" font-size="7" fill="#8b949e">citation/title</text>

  <rect x="415" y="296" width="255" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="542" y="312" text-anchor="middle" font-size="9" fill="#3fb950">④ description</text>
  <text x="542" y="326" text-anchor="middle" font-size="7" fill="#8b949e">MD_DataIdentification/abstract</text>

  <!-- Row 3 -->
  <rect x="150" y="346" width="255" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="277" y="362" text-anchor="middle" font-size="9" fill="#3fb950">⑤ publishingDate</text>
  <text x="277" y="376" text-anchor="middle" font-size="7" fill="#8b949e">date[type=publication] → dateStamp</text>

  <rect x="415" y="346" width="255" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="542" y="362" text-anchor="middle" font-size="9" fill="#3fb950">⑥ type</text>
  <text x="542" y="376" text-anchor="middle" font-size="7" fill="#8b949e">always the literal "Service"</text>

  <!-- Row 4 -->
  <rect x="150" y="396" width="255" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="277" y="412" text-anchor="middle" font-size="9" fill="#3fb950">⑦ nodePID</text>
  <text x="277" y="426" text-anchor="middle" font-size="7" fill="#8b949e">fixed · $node-pid param</text>

  <rect x="415" y="396" width="255" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="542" y="412" text-anchor="middle" font-size="9" fill="#3fb950">⑧ resourceOwner</text>
  <text x="542" y="426" text-anchor="middle" font-size="7" fill="#8b949e">fixed · $resource-owner-pid param</text>

  <!-- Row 5 -->
  <rect x="150" y="446" width="520" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="410" y="462" text-anchor="middle" font-size="9" fill="#3fb950">⑨ publicContact</text>
  <text x="410" y="476" text-anchor="middle" font-size="7" fill="#8b949e">every distinct electronicMailAddress anywhere in the record, deduplicated</text>

  <!-- Row 6 -->
  <rect x="150" y="496" width="255" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="277" y="512" text-anchor="middle" font-size="9" fill="#3fb950">⑩ webpage</text>
  <text x="277" y="526" text-anchor="middle" font-size="7" fill="#8b949e">same landing page as url[0]</text>

  <rect x="415" y="496" width="255" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="542" y="512" text-anchor="middle" font-size="9" fill="#3fb950">⑪ logo</text>
  <text x="542" y="526" text-anchor="middle" font-size="7" fill="#8b949e">fixed · $logo-url param</text>

  <!-- Row 7 -->
  <rect x="150" y="546" width="520" height="52" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="410" y="562" text-anchor="middle" font-size="9" fill="#3fb950">⑫ scientificDomains (object)</text>
  <text x="410" y="575" text-anchor="middle" font-size="7" fill="#8b949e">fixed · always {Natural Sciences → Biological Sciences}</text>
  <text x="410" y="587" text-anchor="middle" font-size="7" fill="#8b949e">per the source sheet ("we can use always")</text>

  <!-- Row 8 -->
  <rect x="150" y="608" width="520" height="52" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="410" y="624" text-anchor="middle" font-size="9" fill="#3fb950">⑬ categories</text>
  <text x="410" y="637" text-anchor="middle" font-size="7" fill="#8b949e">$service-category param (default "support") looked up against the</text>
  <text x="410" y="649" text-anchor="middle" font-size="7" fill="#8b949e">LifeWatch → EOSC category/subcategory table — no ISO 19139 source field exists</text>

  <!-- Row 9 -->
  <rect x="150" y="670" width="520" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="410" y="686" text-anchor="middle" font-size="9" fill="#3fb950">⑭ tags</text>
  <text x="410" y="700" text-anchor="middle" font-size="7" fill="#8b949e">descriptiveKeywords/MD_Keywords/keyword, deduplicated (thesaurus dropped)</text>

  <!-- Row 10 -->
  <rect x="150" y="720" width="255" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="277" y="736" text-anchor="middle" font-size="9" fill="#3fb950">⑮ accessType</text>
  <text x="277" y="750" text-anchor="middle" font-size="7" fill="#8b949e">fixed · $access-type param</text>

  <rect x="415" y="720" width="255" height="40" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="542" y="736" text-anchor="middle" font-size="9" fill="#3fb950">⑯ jurisdiction</text>
  <text x="542" y="750" text-anchor="middle" font-size="7" fill="#8b949e">fixed · $jurisdiction param</text>

  <!-- Row 11 -->
  <rect x="150" y="770" width="520" height="52" rx="5" fill="#0d2211" stroke="#1a4a1f"/>
  <text x="410" y="786" text-anchor="middle" font-size="9" fill="#3fb950">⑰ trl</text>
  <text x="410" y="799" text-anchor="middle" font-size="7" fill="#8b949e">serviceTRL_service/LW_ServiceTRL_service/@codeListValue — LifeWatch extension,</text>
  <text x="410" y="811" text-anchor="middle" font-size="7" fill="#8b949e">not part of the ISO 19139 standard. "" when absent (see Known Limitations)</text>

  <!-- shared templates panel -->
  <rect x="150" y="832" width="520" height="174" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1.5"/>
  <text x="410" y="850" text-anchor="middle" font-size="8" fill="#8b949e">shared named templates</text>

  <rect x="165" y="860" width="235" height="80" rx="5" fill="#0d1117" stroke="#21262d"/>
  <text x="282" y="878" text-anchor="middle" font-size="9" fill="#58a6ff">json-string</text>
  <text x="282" y="892" text-anchor="middle" font-size="7" fill="#8b949e">escapes \ " and newline/CR/tab</text>
  <text x="282" y="904" text-anchor="middle" font-size="7" fill="#8b949e">for every string value emitted</text>
  <text x="282" y="916" text-anchor="middle" font-size="7" fill="#8b949e">(recursive replace-string, XSLT 1.0)</text>

  <rect x="420" y="860" width="235" height="80" rx="5" fill="#0d1117" stroke="#21262d"/>
  <text x="537" y="878" text-anchor="middle" font-size="9" fill="#58a6ff">trl-id</text>
  <text x="537" y="892" text-anchor="middle" font-size="7" fill="#8b949e">"TRL 9 – Actual system ..."</text>
  <text x="537" y="904" text-anchor="middle" font-size="7" fill="#8b949e">→ substring-after "TRL ", before " "</text>
  <text x="537" y="916" text-anchor="middle" font-size="7" fill="#8b949e">→ concat("trl-", n)</text>

  <rect x="165" y="950" width="490" height="46" rx="5" fill="#0d1117" stroke="#21262d"/>
  <text x="410" y="966" text-anchor="middle" font-size="9" fill="#58a6ff">eosc-category-id / eosc-subcategory-id</text>
  <text x="410" y="980" text-anchor="middle" font-size="7" fill="#8b949e">9-row lookup: data access, data processing, modelling, support, help desk, training ... → EOSC ids</text>

  <!-- OUTPUT -->
  <line x1="410" y1="1022" x2="410" y2="1052" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrg)"/>
  <rect x="260" y="1052" width="300" height="48" rx="8" fill="#0d2211" stroke="#3fb950" stroke-width="1.5"/>
  <text x="410" y="1072" text-anchor="middle" font-size="9" fill="#3fb950">OUTPUT</text>
  <text x="410" y="1090" text-anchor="middle" font-size="11" fill="#e6edf3" font-weight="bold">EOSC Resource "Service" (JSON text)</text>

  <!-- legend -->
  <text x="28" y="1132" font-size="7" fill="#4a5568">Operations ①–⑰ correspond to the numbered/named sections in docs/mapping-notes.md</text>
  <text x="28" y="1144" font-size="7" fill="#4a5568">"id" is intentionally never emitted — EOSC assigns it when the resource is registered.</text>
  <text x="28" y="1160" font-size="7" fill="#4a5568">Stylesheet: transformations/ISO19139_to_EOSC/xslt/main.xsl · LifeWatch ERIC · MIT License · 2026</text>
</svg>
